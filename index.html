<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ─── Config ─── */
const DEFAULT_API_KEY = "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";
const DEFAULT_MODEL = "gpt-5.4-mini";
const AVAILABLE_MODELS = ["gpt-5.4", "gpt-5.4-mini", "gpt-5.4-nano"];
const MODEL_PRICING = {
  "gpt-5.4":      { input: 2.50,  output: 15.00 },
  "gpt-5.4-mini": { input: 0.75,  output: 4.50 },
  "gpt-5.4-nano": { input: 0.20,  output: 1.25 },
};

function calcCost(model, inputTokens, outputTokens) {
  const p = MODEL_PRICING[model] || MODEL_PRICING[DEFAULT_MODEL];
  return (inputTokens * p.input + outputTokens * p.output) / 1_000_000;
}

/* ─── OpenAI API caller ─── */
async function callAI(apiKey, model, system, user, jsonMode = true) {
  const body = {
    model,
    messages: [{ role: "system", content: system }, { role: "user", content: user }],
    temperature: 0.8,
  };
  if (jsonMode) body.response_format = { type: "json_object" };
  const resp = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
    body: JSON.stringify(body),
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${resp.status}`);
  }
  const data = await resp.json();
  const usage = data.usage || {};
  const inputTokens = usage.prompt_tokens || 0;
  const outputTokens = usage.completion_tokens || 0;
  return {
    content: data.choices[0].message.content,
    usage: { input_tokens: inputTokens, output_tokens: outputTokens, cost: calcCost(model, inputTokens, outputTokens) },
  };
}

/* ─── Prompt templates ─── */
const PROMPTS = {
  personas: (topic, questions, n) => ({
    system: `You are a debate panel designer. Given a topic, generate diverse expert personas who would have meaningfully different perspectives. Each persona needs:
- id (snake_case, unique)
- name (realistic full or partial name)
- role (specific professional title, 3-6 words)
- flag (single emoji representing their domain)
- color (hex color from this palette: #D4AF37, #EF4444, #60A5FA, #4CAF50, #A78BFA, #F97316, #F59E0B, #EC4899, #06B6D4)
- bg (dark background hex that complements the color, e.g. "#3A3020")
- perspective_brief (1 sentence: what angle they'll argue from)

Ensure diversity: include optimists, pessimists, domain specialists, and systemic thinkers. Return JSON: {"personas": [...]}`,
    user: `Topic: ${topic}\nNumber of personas: ${n}${questions.length ? "\nGuiding questions:\n" + questions.map(q => `- ${q}`).join("\n") : ""}`,
  }),
  debate: (persona, topic, questions, allPersonas) => ({
    system: `You are ${persona.name}, ${persona.role}. You are participating in an expert panel debate. Write a detailed, analytical response (400-600 words) from your professional perspective. Reference specific data, frameworks, or historical parallels where relevant. Engage with what other panelists might argue. Write in first person with authority and specificity.
Your angle: ${persona.perspective_brief}
Other panelists on this panel:
${allPersonas.filter(p => p.id !== persona.id).map(p => `- ${p.name} (${p.role}): ${p.perspective_brief}`).join("\n")}`,
    user: `Topic: ${topic}${questions.length ? "\nKey questions to address:\n" + questions.map(q => `- ${q}`).join("\n") : ""}`,
  }),
  synthesis: (topic, personas, responses) => ({
    system: `You are a senior analyst synthesizing a multi-expert debate panel. Produce a structured synthesis in JSON with:
- consensus: array of 3-5 points all panelists broadly agree on (each a string, 1-2 sentences)
- disagreements: array of 2-4 key tensions, citing which panelists disagree (each a string)
- likely_scenario: 1 paragraph describing the most probable outcome
- wildcard: 1 paragraph describing a low-probability high-impact risk
- historical_verdict: 1 paragraph connecting to historical precedent

Return JSON: {"consensus": [...], "disagreements": [...], "likely_scenario": "...", "wildcard": "...", "historical_verdict": "..."}`,
    user: `Topic: ${topic}\n\nPanel responses:\n${responses.map(r => {
      const p = personas.find(p => p.id === r.persona_id);
      return `**${p.name} (${p.role})**:\n${r.text}`;
    }).join("\n\n")}`,
  }),
  outcomes: (topic, synthesis) => ({
    system: `Based on this debate synthesis, generate 4-5 probability-weighted outcome scenarios. Each needs:
- id (snake_case)
- label (short name, 3-6 words)
- desc (1-2 sentence description)
- prob (integer percentage, MUST sum to exactly 100)

Order from most to least probable. Return JSON: {"outcomes": [...]}`,
    user: `Topic: ${topic}\n\nSynthesis:\n${JSON.stringify(synthesis)}`,
  }),
  vote: (topic, outcome, personasSummary, synthesisSummary) => ({
    system: `You are a senior analyst. The user voted for a specific outcome scenario from a debate panel. Generate a 150-200 word commentary explaining the implications of this view. Be specific about what this means practically. Address trade-offs, what to watch for, and potential actions. Write in second person ("You...").`,
    user: `Topic: ${topic}\n\nVoted outcome: ${outcome.label} — ${outcome.desc} (${outcome.prob}% probability)\n\nPanel context:\n${personasSummary}\n\nSynthesis:\n${synthesisSummary}`,
  }),
  qa: (topic, personas, synthesis, question) => ({
    system: `You are moderating an expert panel Q&A. The user asks a question. Select 3-4 of the most relevant panelists to respond.

Available panelists:
${personas.map(p => `- ${p.name} (${p.role}, id=${p.id}, flag=${p.flag}, color=${p.color}): ${p.perspective_brief}`).join("\n")}

Return JSON: {
  "panel_views": [
    {"persona_id": "...", "name": "...", "flag": "...", "color": "...", "view": "one-word stance like bullish/cautious/risk-flag/hold/bearish/optimistic", "text": "2-3 sentence response in character"}
  ],
  "verdict": "A synthesized paragraph of actionable guidance based on the panel's views"
}`,
    user: `Topic: ${topic}\nDebate synthesis: ${JSON.stringify(synthesis)}\n\nUser question: ${question}`,
  }),
};

/* ─── Components ─── */
function Card({ r, response, isExpanded, onToggle, index, isLoading }) {
  return (
    <div style={{
      background: r.bg, border: "1px solid " + r.color + "33",
      borderLeft: "3px solid " + r.color, borderRadius: 8,
      marginBottom: 12, overflow: "hidden",
      animation: "fadeIn 0.4s ease-out " + (index * 0.08) + "s both"
    }}>
      <div onClick={onToggle} style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "14px 18px", cursor: "pointer", userSelect: "none"
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 20 }}>{r.flag}</span>
          <div>
            <div style={{ color: r.color, fontFamily: "'Playfair Display', Georgia, serif", fontSize: 15, fontWeight: 700 }}>{r.name}</div>
            <div style={{ color: "#8A8A8A", fontSize: 10, fontFamily: "'Space Mono', monospace", letterSpacing: "0.06em" }}>{r.role.toUpperCase()}</div>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          {isLoading && <span style={{ color: r.color, fontSize: 10, fontFamily: "'Space Mono', monospace", animation: "pulse 1.5s infinite" }}>THINKING...</span>}
          {response && <span style={{ color: "#4CAF50", fontSize: 12 }}>&#10003;</span>}
          <span style={{ color: r.color + "88", fontSize: 18, transition: "transform 0.3s", transform: isExpanded ? "rotate(180deg)" : "rotate(0deg)" }}>&#9662;</span>
        </div>
      </div>
      {isExpanded && response && (
        <div style={{ padding: "0 18px 16px", color: "#D8D0C4", fontSize: 13.5, lineHeight: 1.8, fontFamily: "'Source Serif 4', Georgia, serif", borderTop: "1px solid " + r.color + "15" }}>
          {response.split("\n\n").map((p, i) => <p key={i} style={{ margin: "12px 0" }}>{p}</p>)}
        </div>
      )}
      {isExpanded && !response && isLoading && (
        <div style={{ padding: "16px 18px", color: "#6B5F50", fontSize: 13, fontStyle: "italic", borderTop: "1px solid " + r.color + "15" }}>
          Formulating response...
        </div>
      )}
    </div>
  );
}

function OutcomeBar({ outcome, userVote, onVote }) {

        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>

            width: 18, height: 18, borderRadius: "50%",
            border: isVoted ? "2px solid #D4AF37" : "1px solid #564E43",

            fontSize: 10, color: isVoted ? "#000" : "transparent", transition: "all 0.2s"

        </div>
        <span style={{ color: "#D4AF37", fontFamily: "'Space Mono', monospace", fontSize: 12 }}>{outcome.prob}%</span>

}

function Spinner({ size = 16, color = "#D4AF37" }) {
  return <div style={{

/* ─── Input Screen ─── */
function InputScreen({ onGenerate }) {
  const [topic, setTopic] = useState("");
  const [questions, setQuestions] = useState("");
  const [numPersonas, setNumPersonas] = useState(5);
  const [model, setModel] = useState(DEFAULT_MODEL);
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("openai_api_key") || "");
  const [showKey, setShowKey] = useState(false);

  const effectiveKey = apiKey.trim() || DEFAULT_API_KEY;

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div style={{ maxWidth: 640, width: "100%", animation: "fadeIn 0.5s ease-out" }}>
        <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#5A5040", letterSpacing: "0.2em", marginBottom: 8 }}>
          AI-POWERED DEBATE SIMULATOR
        </div>
        <h1 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 32, fontWeight: 900, color: "#E8E0D4", marginBottom: 8 }}>
          Debate Simulator
        </h1>
        <p style={{ color: "#7A6F5F", fontSize: 14, marginBottom: 32, fontStyle: "italic" }}>
          Inject a scenario. AI personas will debate it from multiple angles, synthesize findings, and let you vote on outcomes.
        </p>

        <div style={{ marginBottom: 20 }}>
          <label style={{ color: "#998A78", fontFamily: "'Space Mono', monospace", fontSize: 10, letterSpacing: "0.1em", display: "block", marginBottom: 8 }}>
            SCENARIO / TOPIC *
          </label>
          <textarea
            value={topic} onChange={e => setTopic(e.target.value)}
            placeholder="e.g. Impact of a US-China semiconductor embargo on Southeast Asian tech companies over the next 12 months"
            rows={4}
            style={{ width: "100%", padding: "14px 16px", borderRadius: 8, background: "#36312A", border: "1px solid #4D463B", color: "#E8E0D4", fontFamily: "'Source Serif 4', Georgia, serif", fontSize: 14, lineHeight: 1.6, resize: "vertical" }}
          />
        </div>

        <div style={{ marginBottom: 20 }}>
          <label style={{ color: "#998A78", fontFamily: "'Space Mono', monospace", fontSize: 10, letterSpacing: "0.1em", display: "block", marginBottom: 8 }}>
            GUIDING QUESTIONS (OPTIONAL, ONE PER LINE)
          </label>
          <textarea
            value={questions} onChange={e => setQuestions(e.target.value)}
            placeholder={"Which sectors are most vulnerable?\nWhat are the second-order effects?\nHistorical parallels?"}
            rows={3}
            style={{ width: "100%", padding: "14px 16px", borderRadius: 8, background: "#36312A", border: "1px solid #4D463B", color: "#E8E0D4", fontFamily: "'Source Serif 4', Georgia, serif", fontSize: 13, lineHeight: 1.6, resize: "vertical" }}
          />
        </div>

        <div style={{ display: "flex", gap: 20, marginBottom: 20 }}>
          <div style={{ flex: 1 }}>
            <label style={{ color: "#998A78", fontFamily: "'Space Mono', monospace", fontSize: 10, letterSpacing: "0.1em", display: "block", marginBottom: 8 }}>
              PANELISTS: {numPersonas}
            </label>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <span style={{ color: "#665", fontSize: 12 }}>3</span>
              <input type="range" min={3} max={10} value={numPersonas}
                onChange={e => setNumPersonas(parseInt(e.target.value))}
                style={{ flex: 1, accentColor: "#D4AF37" }} />
              <span style={{ color: "#665", fontSize: 12 }}>10</span>
            </div>
          </div>
          <div style={{ flex: 1 }}>
            <label style={{ color: "#998A78", fontFamily: "'Space Mono', monospace", fontSize: 10, letterSpacing: "0.1em", display: "block", marginBottom: 8 }}>
              MODEL
            </label>
            <select value={model} onChange={e => setModel(e.target.value)}
              style={{ width: "100%", padding: "10px 16px", borderRadius: 8, background: "#36312A", border: "1px solid #4D463B", color: "#E8E0D4", fontFamily: "'Space Mono', monospace", fontSize: 12, cursor: "pointer" }}>
              {AVAILABLE_MODELS.map(m => <option key={m} value={m} style={{ background: "#36312A" }}>{m}</option>)}
            </select>
          </div>
        </div>

        <div style={{ marginBottom: 32 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <label style={{ color: "#998A78", fontFamily: "'Space Mono', monospace", fontSize: 10, letterSpacing: "0.1em" }}>
              OPENAI API KEY (OPTIONAL — DEFAULT PROVIDED)
            </label>
            <button onClick={() => setShowKey(!showKey)} style={{
              background: "none", border: "none", color: "#6B5F50", fontFamily: "'Space Mono', monospace", fontSize: 9, letterSpacing: "0.05em"
            }}>{showKey ? "HIDE" : "SHOW"}</button>
          </div>
          <input
            type={showKey ? "text" : "password"}
            value={apiKey}
            onChange={e => { setApiKey(e.target.value); localStorage.setItem("openai_api_key", e.target.value); }}
            placeholder="Leave blank to use default key"
            style={{ width: "100%", padding: "10px 16px", borderRadius: 8, background: "#36312A", border: "1px solid #4D463B", color: "#E8E0D4", fontFamily: "'Space Mono', monospace", fontSize: 12 }}
          />
          {!apiKey.trim() && (
            <div style={{ color: "#6B5F50", fontSize: 10, fontFamily: "'Space Mono', monospace", marginTop: 4 }}>
              Using default key. Paste your own to avoid rate limits.
            </div>
          )}
        </div>

        <button
          onClick={() => topic.trim() && onGenerate({ topic: topic.trim(), guiding_questions: questions, num_personas: numPersonas, model, apiKey: effectiveKey })}
          disabled={!topic.trim()}
          style={{
            width: "100%", padding: "16px 24px", borderRadius: 8,
            border: topic.trim() ? "1px solid #D4AF37" : "1px solid #564E43",
            background: topic.trim() ? "linear-gradient(135deg, #D4AF3722, #F59E0B11)" : "#36312A",
            color: topic.trim() ? "#D4AF37" : "#564E43",
            fontFamily: "'Space Mono', monospace", fontSize: 13, fontWeight: 700,
            letterSpacing: "0.1em", transition: "all 0.3s"
          }}
        >
          GENERATE DEBATE &#8594;
        </button>
      </div>
    </div>
  );
}

/* ─── Main App ─── */
function App() {
  const [stage, setStage] = useState("input");
  const [loadingMsg, setLoadingMsg] = useState("");
  const [topic, setTopic] = useState("");
  const [personas, setPersonas] = useState([]);
  const [responses, setResponses] = useState({});
  const [synthesis, setSynthesis] = useState(null);
  const [outcomes, setOutcomes] = useState([]);
  const [activeTab, setActiveTab] = useState("debate");
  const [expanded, setExpanded] = useState(new Set());
  const [expandAll, setExpandAll] = useState(false);
  const [userVote, setUserVote] = useState(null);
  const [voteCommentary, setVoteCommentary] = useState(null);
  const [voteLoading, setVoteLoading] = useState(false);
  const [qaInput, setQaInput] = useState("");
  const [qaHistory, setQaHistory] = useState([]);
  const [qaLoading, setQaLoading] = useState(false);
  const [qaExpanded, setQaExpanded] = useState(new Set());
  const [selectedModel, setSelectedModel] = useState(DEFAULT_MODEL);
  const [apiKey, setApiKey] = useState(DEFAULT_API_KEY);
  const [usage, setUsage] = useState(null);
  const [error, setError] = useState(null);

  // Keep refs for async access
  const personasRef = useRef([]);
  const responsesRef = useRef([]);
  const synthesisRef = useRef(null);

  const addUsage = (u) => {
    setUsage(prev => {
      if (!prev) return { input_tokens: u.input_tokens, output_tokens: u.output_tokens, cost: u.cost, calls: 1, model: selectedModel };
      return { ...prev, input_tokens: prev.input_tokens + u.input_tokens, output_tokens: prev.output_tokens + u.output_tokens, cost: prev.cost + u.cost, calls: prev.calls + 1 };
    });
  };

  const toggle = (id) => setExpanded(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const toggleAll = () => {
    if (expandAll) setExpanded(new Set());
    else setExpanded(new Set(personas.map(p => p.id)));
    setExpandAll(!expandAll);
  };

  const handleGenerate = async (params) => {
    const { topic: t, guiding_questions, num_personas, model, apiKey: key } = params;
    const questions = guiding_questions.split("\n").map(q => q.trim()).filter(Boolean);
    setStage("loading"); setTopic(t); setSelectedModel(model); setApiKey(key);
    setLoadingMsg("Assembling expert panel..."); setError(null);
    setPersonas([]); setResponses({}); setSynthesis(null); setOutcomes([]);
    setUserVote(null); setVoteCommentary(null); setQaHistory([]);
    setActiveTab("debate"); setUsage(null);
    personasRef.current = []; responsesRef.current = []; synthesisRef.current = null;

    try {
      // Step 1: Generate personas
      const p1 = PROMPTS.personas(t, questions, num_personas);
      const r1 = await callAI(key, model, p1.system, p1.user, true);
      const generatedPersonas = JSON.parse(r1.content).personas;
      personasRef.current = generatedPersonas;
      setPersonas(generatedPersonas);
      setExpanded(new Set([generatedPersonas[0]?.id]));
      addUsage(r1.usage);

      // Step 2: Debate responses (parallel)
      setLoadingMsg("Panelists are debating...");
      const debatePromises = generatedPersonas.map(async (persona) => {
        const p2 = PROMPTS.debate(persona, t, questions, generatedPersonas);
        const r2 = await callAI(key, model, p2.system, p2.user, false);
        const result = { persona_id: persona.id, text: r2.content.trim() };
        responsesRef.current = [...responsesRef.current, result];
        setResponses(prev => ({ ...prev, [persona.id]: r2.content.trim() }));
        addUsage(r2.usage);
        return result;
      });
      const allResponses = await Promise.all(debatePromises);

      // Step 3: Synthesis
      setLoadingMsg("Synthesizing panel views...");
      const p3 = PROMPTS.synthesis(t, generatedPersonas, allResponses);
      const r3 = await callAI(key, model, p3.system, p3.user, true);
      const syn = JSON.parse(r3.content);
      synthesisRef.current = syn;
      setSynthesis(syn);
      addUsage(r3.usage);

      // Step 4: Outcomes
      setLoadingMsg("Generating outcome scenarios...");
      const p4 = PROMPTS.outcomes(t, syn);
      const r4 = await callAI(key, model, p4.system, p4.user, true);
      setOutcomes(JSON.parse(r4.content).outcomes);
      addUsage(r4.usage);

      setStage("ready");
    } catch (err) {
      setError(err.message);
      setLoadingMsg("Error: " + err.message);
    }
  };

  const handleVote = async (outcomeId) => {
    setUserVote(outcomeId); setVoteCommentary(null); setVoteLoading(true);
    const outcome = outcomes.find(o => o.id === outcomeId);
    try {
      const p = PROMPTS.vote(topic, outcome,
        personas.map(p => `${p.name} (${p.role}): ${p.perspective_brief}`).join("\n"),
        synthesis ? synthesis.likely_scenario : "");
      const r = await callAI(apiKey, selectedModel, p.system, p.user, false);
      setVoteCommentary(r.content.trim());
      addUsage(r.usage);
    } catch (err) { setVoteCommentary("Error: " + err.message); }
    setVoteLoading(false);
  };

  const handleQa = async () => {
    if (!qaInput.trim() || qaLoading) return;
    const question = qaInput.trim(); setQaInput(""); setQaLoading(true);
    try {
      const p = PROMPTS.qa(topic, personas, synthesis, question);
      const r = await callAI(apiKey, selectedModel, p.system, p.user, true);
      const data = JSON.parse(r.content);
      const newIdx = qaHistory.length;
      addUsage(r.usage);
      setQaHistory(prev => [...prev, { question, ...data }]);
      setQaExpanded(prev => new Set([...prev, newIdx]));
    } catch (err) {
      setQaHistory(prev => [...prev, { question, panel_views: [], verdict: "Error: " + err.message }]);
    }
    setQaLoading(false);
  };

  const respondedIds = new Set(Object.keys(responses));
  const debateReady = personas.length > 0;
  const synthesisReady = synthesis !== null;
  const outcomesReady = outcomes.length > 0;
  const tabs = [
    { id: "debate", label: "Debate", ready: debateReady },
    { id: "synthesis", label: "Synthesis", ready: synthesisReady },
    { id: "outcomes", label: "Outcomes & Vote", ready: outcomesReady },
    { id: "qa", label: "Q&A", ready: synthesisReady },
  ];

  if (stage === "input") return <InputScreen onGenerate={handleGenerate} />;

  return (
    <div style={{ minHeight: "100vh", background: "#2C2820", color: "#E8E0D4", fontFamily: "'Source Serif 4', Georgia, serif" }}>
      <header style={{ borderBottom: "1px solid #3E3930", padding: "20px 24px", background: "linear-gradient(180deg, #36312A 0%, #2C2820 100%)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#5A5040", letterSpacing: "0.2em", marginBottom: 5 }}>
              AI DEBATE SIMULATOR // MULTI-PERSPECTIVE ANALYSIS
            </div>
            <h1 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 22, fontWeight: 900, color: "#E8E0D4", margin: 0, maxWidth: 700 }}>
              {topic}
            </h1>
            {personas.length > 0 && (
              <div style={{ fontSize: 13, color: "#7A6F5F", marginTop: 4, fontStyle: "italic" }}>
                {personas.length} panelists debating from diverse perspectives
              </div>
            )}
          </div>
          <button onClick={() => setStage("input")} style={{
            padding: "8px 16px", borderRadius: 6, border: "1px solid #4D463B",
            background: "#3A352D", color: "#998A78", fontFamily: "'Space Mono', monospace", fontSize: 10, letterSpacing: "0.05em", flexShrink: 0
          }}>NEW DEBATE</button>
        </div>
      </header>

      {stage === "loading" && (
        <div style={{ padding: "12px 24px", background: "#3A352D", borderBottom: "1px solid #3E3930", display: "flex", alignItems: "center", gap: 10 }}>
          <Spinner size={14} />
          <span style={{ color: "#D4AF37", fontFamily: "'Space Mono', monospace", fontSize: 11 }}>{loadingMsg}</span>
        </div>
      )}

      {usage && (
        <div style={{
          padding: "8px 24px", background: "#332F26", borderBottom: "1px solid #3E3930",
          display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8,
          fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#6B5F50"
        }}>
          <div style={{ display: "flex", gap: 20, alignItems: "center", flexWrap: "wrap" }}>
            <span>MODEL: <span style={{ color: "#998A78" }}>{usage.model}</span></span>
            <span>CALLS: <span style={{ color: "#998A78" }}>{usage.calls}</span></span>
            <span>INPUT: <span style={{ color: "#998A78" }}>{usage.input_tokens.toLocaleString()}</span> tkns</span>
            <span>OUTPUT: <span style={{ color: "#998A78" }}>{usage.output_tokens.toLocaleString()}</span> tkns</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <span>EST. COST:</span>
            <span style={{ color: "#D4AF37", fontSize: 12, fontWeight: 700 }}>${usage.cost.toFixed(4)}</span>
          </div>
        </div>
      )}

      <div style={{ display: "flex", gap: 0, borderBottom: "1px solid #3E3930", background: "#302B24" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => t.ready && setActiveTab(t.id)} style={{
            padding: "12px 24px", border: "none",
            background: activeTab === t.id ? "#3A352D" : "transparent",
            color: !t.ready ? "#564E43" : activeTab === t.id ? "#D4AF37" : "#6B5F50",
            fontFamily: "'Space Mono', monospace", fontSize: 11, letterSpacing: "0.08em",
            borderBottom: activeTab === t.id ? "2px solid #D4AF37" : "2px solid transparent",
            transition: "all 0.2s", cursor: t.ready ? "pointer" : "default", opacity: t.ready ? 1 : 0.4
          }}>{t.label.toUpperCase()}</button>
        ))}
      </div>

      <div style={{ padding: "20px 24px", maxHeight: "calc(100vh - 180px)", overflowY: "auto" }}>

        {activeTab === "debate" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#5A5040", letterSpacing: "0.15em" }}>
                {respondedIds.size} / {personas.length} PANELISTS RESPONDED — CLICK TO EXPAND/COLLAPSE
              </div>
              {personas.length > 0 && (
                <button onClick={toggleAll} style={{
                  padding: "5px 12px", borderRadius: 4, border: "1px solid #4D463B",
                  background: "#3A352D", color: "#998A78", fontFamily: "'Space Mono', monospace", fontSize: 10
                }}>{expandAll ? "COLLAPSE ALL" : "EXPAND ALL"}</button>
              )}
            </div>
            {personas.map((r, i) => (
              <Card key={r.id} r={r} index={i} response={responses[r.id]}
                isLoading={!responses[r.id] && stage === "loading"}
                isExpanded={expanded.has(r.id)} onToggle={() => toggle(r.id)} />
            ))}
          </div>
        )}

        {activeTab === "synthesis" && synthesis && (
          <div style={{ animation: "fadeIn 0.4s ease-out" }}>
            <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#5A5040", letterSpacing: "0.15em", marginBottom: 20 }}>CROSS-PANEL SYNTHESIS</div>
            <div style={{ background: "#33362C", border: "1px solid #4CAF5033", borderLeft: "3px solid #4CAF50", borderRadius: 8, padding: "16px 20px", marginBottom: 16 }}>
              <div style={{ color: "#4CAF50", fontFamily: "'Playfair Display', serif", fontSize: 16, fontWeight: 700, marginBottom: 10 }}>Consensus Points</div>
              {synthesis.consensus.map((c, i) => (
                <div key={i} style={{ display: "flex", gap: 10, marginBottom: 10, animation: "slideIn 0.3s ease-out " + (i * 0.1) + "s both" }}>
                  <span style={{ color: "#4CAF50", fontSize: 14, marginTop: 1, flexShrink: 0 }}>&#9656;</span>
                  <span style={{ color: "#C8BFA8", fontSize: 13.5, lineHeight: 1.7 }}>{c}</span>
                </div>
              ))}
            </div>
            <div style={{ background: "#38302A", border: "1px solid #EF444433", borderLeft: "3px solid #EF4444", borderRadius: 8, padding: "16px 20px", marginBottom: 16 }}>
              <div style={{ color: "#EF4444", fontFamily: "'Playfair Display', serif", fontSize: 16, fontWeight: 700, marginBottom: 10 }}>Key Disagreements</div>
              {synthesis.disagreements.map((d, i) => (
                <div key={i} style={{ display: "flex", gap: 10, marginBottom: 10, animation: "slideIn 0.3s ease-out " + (i * 0.1 + 0.3) + "s both" }}>
                  <span style={{ color: "#EF4444", fontSize: 14, marginTop: 1, flexShrink: 0 }}>&#9889;</span>
                  <span style={{ color: "#C8BFA8", fontSize: 13.5, lineHeight: 1.7 }}>{d}</span>
                </div>
              ))}
            </div>
            <div style={{ background: "#37332B", border: "1px solid #D4AF3733", borderLeft: "3px solid #D4AF37", borderRadius: 8, padding: "16px 20px", marginBottom: 16 }}>
              <div style={{ color: "#D4AF37", fontFamily: "'Playfair Display', serif", fontSize: 16, fontWeight: 700, marginBottom: 10 }}>Most Likely Scenario</div>
              <p style={{ color: "#C8BFA8", fontSize: 13.5, lineHeight: 1.8, margin: 0 }}>{synthesis.likely_scenario}</p>
            </div>
            <div style={{ background: "#382F28", border: "1px solid #FF634733", borderLeft: "3px solid #FF6347", borderRadius: 8, padding: "16px 20px", marginBottom: 16 }}>
              <div style={{ color: "#FF6347", fontFamily: "'Playfair Display', serif", fontSize: 16, fontWeight: 700, marginBottom: 10 }}>Wildcard Risk</div>
              <p style={{ color: "#C8BFA8", fontSize: 13.5, lineHeight: 1.8, margin: 0 }}>{synthesis.wildcard}</p>
            </div>
            <div style={{ background: "#37342A", border: "1px solid #F59E0B33", borderLeft: "3px solid #F59E0B", borderRadius: 8, padding: "16px 20px" }}>
              <div style={{ color: "#F59E0B", fontFamily: "'Playfair Display', serif", fontSize: 16, fontWeight: 700, marginBottom: 10 }}>Historical Context</div>
              <p style={{ color: "#C8BFA8", fontSize: 13.5, lineHeight: 1.8, margin: 0, fontStyle: "italic" }}>{synthesis.historical_verdict}</p>
            </div>
          </div>
        )}

        {activeTab === "outcomes" && outcomesReady && (
          <div style={{ animation: "fadeIn 0.4s ease-out" }}>
            <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#5A5040", letterSpacing: "0.15em", marginBottom: 6 }}>SCENARIO PROBABILITIES — VOTE ON YOUR VIEW</div>
            <div style={{ color: "#7A6F5F", fontSize: 12, marginBottom: 20, fontStyle: "italic" }}>Click a circle to cast your vote — implications will be generated based on the debate context</div>
            <div style={{ background: "#36312A", border: "1px solid #433D34", borderRadius: 10, padding: "20px 24px", marginBottom: 20 }}>
              {outcomes.map(o => <OutcomeBar key={o.id} outcome={o} userVote={userVote} onVote={handleVote} />)}
            </div>
            {(voteLoading || voteCommentary) && (
              <div style={{ background: "#37342A", border: "1px solid #D4AF3733", borderRadius: 8, padding: "16px 20px", marginBottom: 20, animation: "fadeIn 0.3s ease-out" }}>
                <div style={{ color: "#D4AF37", fontFamily: "'Playfair Display', serif", fontSize: 15, fontWeight: 700, marginBottom: 8, display: "flex", alignItems: "center", gap: 8 }}>
                  Implications: {outcomes.find(o => o.id === userVote)?.label}
                  {voteLoading && <Spinner size={12} />}
                </div>
                {voteCommentary && <div style={{ color: "#B8AE9A", fontSize: 13, lineHeight: 1.8 }}>{voteCommentary}</div>}
              </div>
            )}
          </div>
        )}

        {activeTab === "qa" && (
          <div style={{ animation: "fadeIn 0.4s ease-out" }}>
            <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#5A5040", letterSpacing: "0.15em", marginBottom: 6 }}>
              ASK THE PANEL — QUESTIONS ANSWERED THROUGH MULTI-EXPERT LENS
            </div>
            <div style={{ color: "#7A6F5F", fontSize: 12, marginBottom: 20, fontStyle: "italic" }}>
              Type a question below — the panel will respond from their diverse perspectives
            </div>
            <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
              <input value={qaInput} onChange={e => setQaInput(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter") handleQa(); }}
                placeholder="e.g. 'What are the biggest risks in the next 3 months?'"
                style={{ flex: 1, padding: "12px 16px", borderRadius: 8, background: "#36312A", border: "1px solid #4D463B", color: "#E8E0D4", fontFamily: "'Source Serif 4', Georgia, serif", fontSize: 13 }} />
              <button onClick={handleQa} disabled={qaLoading || !qaInput.trim()}
                style={{
                  padding: "12px 20px", borderRadius: 8, border: "1px solid #D4AF3766",
                  background: "#D4AF3722", color: "#D4AF37",
                  fontFamily: "'Space Mono', monospace", fontSize: 11, fontWeight: 700,
                  letterSpacing: "0.05em", whiteSpace: "nowrap",
                  opacity: (qaLoading || !qaInput.trim()) ? 0.5 : 1, display: "flex", alignItems: "center", gap: 8
                }}>
                {qaLoading ? <><Spinner size={12} /> ASKING...</> : "ASK PANEL \u2192"}
              </button>
            </div>

            {qaHistory.map((qa, qi) => (
              <div key={qi} style={{ background: "#36312A", border: "1px solid #433D34", borderRadius: 10, marginBottom: 20, overflow: "hidden", animation: "fadeIn 0.4s ease-out" }}>
                <div onClick={() => setQaExpanded(prev => { const n = new Set(prev); n.has(qi) ? n.delete(qi) : n.add(qi); return n; })}
                  style={{ padding: "16px 20px", cursor: "pointer", userSelect: "none", display: "flex", justifyContent: "space-between", alignItems: "flex-start", background: "#3A352D" }}>
                  <div style={{ display: "flex", gap: 10, flex: 1 }}>
                    <span style={{ color: "#D4AF37", fontSize: 16, marginTop: 1, flexShrink: 0 }}>Q</span>
                    <span style={{ color: "#E8E0D4", fontSize: 14, fontWeight: 600, lineHeight: 1.5 }}>{qa.question}</span>
                  </div>
                  <span style={{ color: "#6B5F5088", fontSize: 18, transition: "transform 0.3s", transform: qaExpanded.has(qi) ? "rotate(180deg)" : "rotate(0deg)", marginLeft: 12, flexShrink: 0 }}>&#9662;</span>
                </div>
                {qaExpanded.has(qi) && (
                  <div style={{ padding: "0 20px 20px" }}>
                    <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 9, color: "#5A5040", letterSpacing: "0.15em", margin: "16px 0 12px", paddingBottom: 8, borderBottom: "1px solid #3E3930" }}>PANEL VIEWS</div>
                    {qa.panel_views.map((p, pi) => {
                      const viewColors = { bullish: "#4CAF50", optimistic: "#4CAF50", hold: "#4CAF50", cautious: "#F59E0B", bearish: "#EF4444", "risk-flag": "#EF4444", neutral: "#60A5FA" };
                      const vc = viewColors[p.view] || "#60A5FA";
                      return (
                        <div key={pi} style={{ display: "flex", gap: 12, marginBottom: 14, animation: "slideIn 0.3s ease-out " + (pi * 0.08) + "s both" }}>
                          <div style={{ flexShrink: 0, textAlign: "center", width: 50 }}>
                            <div style={{ fontSize: 18 }}>{p.flag}</div>
                            <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 8, color: p.color, marginTop: 2 }}>{p.name}</div>
                            <div style={{ fontSize: 8, fontFamily: "'Space Mono', monospace", marginTop: 3, padding: "2px 6px", borderRadius: 3, display: "inline-block", background: vc + "22", color: vc, border: "1px solid " + vc + "44" }}>{p.view.toUpperCase()}</div>
                          </div>
                          <div style={{ color: "#B8AE9A", fontSize: 13, lineHeight: 1.7 }}>{p.text}</div>
                        </div>
                      );
                    })}
                    <div style={{ background: "#37342A", border: "1px solid #D4AF3733", borderLeft: "3px solid #D4AF37", borderRadius: 8, padding: "14px 18px", marginTop: 16 }}>
                      <div style={{ color: "#D4AF37", fontFamily: "'Playfair Display', serif", fontSize: 14, fontWeight: 700, marginBottom: 8 }}>Panel Verdict</div>
                      <div style={{ color: "#C8BFA8", fontSize: 13, lineHeight: 1.8 }}>{qa.verdict}</div>
                    </div>
                  </div>
                )}
              </div>
            ))}

            {qaHistory.length === 0 && !qaLoading && (
              <div style={{ textAlign: "center", padding: "40px 0", color: "#564E43", fontFamily: "'Space Mono', monospace", fontSize: 11, letterSpacing: "0.1em" }}>
                ASK A QUESTION TO GET MULTI-PERSPECTIVE ANSWERS FROM THE PANEL
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
